<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive IPv4 Map</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta
      property="og:title"
      content="Interactive IPv4 Address Space Visualizer"
    />
    <meta
      property="og:description"
      content="Explore the IPv4 address space with an interactive visualization. Hover over the map to see IP addresses and blocks."
    />
    <meta
      property="og:image"
      content="https://proyolo-ks1.github.io/IPv4AddressSpaceVisualizer/assets/IPv4-Census-VisualizationOfTheIPv4AddressSpace-20061108-4096x4096.png"
    />
    <meta
      property="og:url"
      content="https://proyolo-ks1.github.io/IPv4AddressSpaceVisualizer/"
    />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Interactive IPv4 Address Space Visualizer"
    />
    <meta
      name="twitter:description"
      content="Explore the IPv4 address space with an interactive visualization. Hover over the map to see IP addresses and blocks."
    />
    <meta
      name="twitter:image"
      content="https://proyolo-ks1.github.io/IPv4AddressSpaceVisualizer/assets/IPv4-Census-VisualizationOfTheIPv4AddressSpace-20061108-4096x4096.png"
    />
  </head>
  <body>
    <h1>Interactive IPv4 Address Space</h1>
    <div class="main-container">
      <div class="image-container">
        <img
          id="ipv4-image"
          src="assets/IPv4-Census-VisualizationOfTheIPv4AddressSpace-20061108-4096x4096.png"
          alt="IPv4 Census"
        />
        <div id="tooltip"></div>
      </div>
      <div id="info-panel">
        <h2>IP Info</h2>
        <div id="ip-console">Hover over the image</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
