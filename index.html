<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive IPv4 Map</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Interactive IPv4 Address Space</h1>
    <div class="main-container">
      <div class="image-container">
        <img
          id="ipv4-image"
          src="assets/IPv4-Census-VisualizationOfTheIPv4AddressSpace-20061108-4096x4096.png"
          alt="IPv4 Census"
        />
        <div id="tooltip"></div>
      </div>
      <div id="info-panel">
        <h2>IP Info</h2>
        <div id="ip-console">Hover over the image</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
